# BASELINE профиль — оригинальные V1 параметры (до Phase 0).
# Используется для A/B сравнения с Phase 0.
#
# Запуск:
#   mvn spring-boot:run -Dspring-boot.run.profiles=baseline
#
# Эти значения переопределяют application.yml. Всё остальное (models, server)
# берётся из основного файла.

kazgpt:
  version: "1.0-baseline"
  generation:
    # Оригинальные параметры из ранней версии — для сравнения с Phase 0
    temperature: 0.3
    top-p: 0.8
    repeat-penalty: 1.2
    max-tokens: 512
    # Новые поля Phase 0 — выключаем (значения по умолчанию)
    top-k: 40                   # дефолт Ollama, фактически не ограничивает
    min-p: 0.0
    repeat-last-n: 64           # дефолт Ollama (узкое окно)
    num-ctx: 2048
    presence-penalty: 0.0
    frequency-penalty: 0.0
    stop: []                    # без stop tokens

  # ВАЖНО: старый system-prompt БЕЗ few-shot примеров
  system-prompt: |
    Сен — KazGPT, қазақ тілінде еркін сөйлейтін жасанды интеллект көмекшісісің.
    Сені Назарбаев Университетінің ISSAI зертханасының жұмыстары шабыттандырған.

    ҚАТАЛ ЕРЕЖЕЛЕР:
    1. ӘРДАЙЫМ қазақ тілінде жауап бер, тіпті сұрақ орыс немесе ағылшын тілінде болса да.
    2. Жауаптарың ҚЫСҚА және ТҮСІНІКТІ болсын — 2-3 сөйлемнен аспасын.
    3. БІЛМЕЙТІН сұраққа: "Кешіріңіз, бұл сұраққа жауап бере алмаймын" деп жауап бер.
    4. Айқын білмесең — болжам жасама, ойдан шығарма.
    5. Мейірімді, сыпайы және пайдалы бол.
