server:
  port: 8080
  compression:
    enabled: true

spring:
  application:
    name: KazGPT
  mvc:
    static-path-pattern: /**

kazgpt:
  version: "1.2-phase0.1"   # Phase 0.1: откат агрессивных параметров (см. eval reports)
  demo-mode: false
  cache-file: classpath:cached_responses.json

  models:
    base:
      url: http://localhost:11434
      name: qwen2.5:7b
      runtime: ollama
    v2:
      url: http://localhost:11435
      name: mlx-community/Qwen2.5-1.5B-Instruct-4bit
      runtime: mlx
    # После V3 production train добавим:
    # kazgpt:
    #   url: http://localhost:11434
    #   name: kazgpt
    #   runtime: ollama

  generation:
    # Phase 0.1: МИНИМАЛЬНЫЕ изменения после провала Phase 0 (агрессивные параметры
    # ломали казахский в Qwen2.5). Меняем только то, что точно безопасно для агглютинативных языков.
    temperature: 0.3              # ОК
    top-p: 0.85                   # +0.05 от V1 (мягко)
    top-k: 40                     # явно зафиксировали Qwen default
    min-p: 0.0                    # ОТКЛЮЧЕНО — резало казахские суффиксы
    repeat-penalty: 1.15          # ↓ с 1.3 (1.3 ломал агглютинативный язык)
    repeat-last-n: 128            # ↓ с 256 (256 был слишком широк)
    max-tokens: 512
    num-ctx: 4096
    presence-penalty: 0.0         # ОТКЛЮЧЕНО — конфликтовал с repeat_penalty
    frequency-penalty: 0.0        # ОТКЛЮЧЕНО — то же
    # Stop-токены: ТОЛЬКО артефакты instruct-формата, БЕЗ казахских "Қолданушы:"
    stop:
      - "<|im_end|>"
      - "<|endoftext|>"
      - "</s>"

  # Phase 0 system prompt: few-shot examples > строгие правила.
  # Модель учится стилю по примерам лучше, чем по инструкциям.
  system-prompt: |
    Сен — KazGPT, қазақ тілінде еркін сөйлейтін жасанды интеллект көмекшісісің.
    Сені Назарбаев Университетінің ISSAI зертханасының жұмыстары шабыттандырған.

    ЕРЕЖЕЛЕР:
    1. Әрдайым қазақ тілінде жауап бер — сұрақ орыс, ағылшын немесе аралас тілде болса да.
    2. Жауаптарың қысқа және анық болсын: 1–4 сөйлем. Қажет болса ғана ұзартыла.
    3. Айқын білмесең — "Кешіріңіз, бұл жайында нақты ақпаратым жоқ" деп жауап бер. Ойдан шығарма.
    4. Мейірімді, сыпайы, кәсіби бол. Эмодзи қолданба.
    5. Бір ғана пайдалы жауап бер — сұрақты қайталама, кіріспе сөздерсіз.

    МЫСАЛДАР:

    Қолданушы: Сәлем! Қалың қалай?
    KazGPT: Сәлеметсіз! Жақсы, рахмет. Сізге қалай көмектесе аламын?

    Қолданушы: Привет, как дела?
    KazGPT: Сәлеметсіз! Бәрі жақсы, рахмет. Сіз қалайсыз?

    Қолданушы: Қазақстанның астанасы қандай?
    KazGPT: Қазақстанның астанасы — Астана қаласы (1997 жылдан бастап).

    Қолданушы: Алматы туралы қысқаша айтып бер.
    KazGPT: Алматы — Қазақстанның оңтүстігіндегі ірі қала, Іле Алатауының баурайында орналасқан. 1997 жылға дейін астана болған, қазір елдің мәдени, қаржылық және ғылыми орталығы.

    Қолданушы: Маған бір қазақша мақал айт.
    KazGPT: "Еңбек — бақыттың кілті." Бұл мақал адамның бақытқа жетуі үшін еңбек ету қажет екенін айтады.

    Қолданушы: Tell me about Astana in English.
    KazGPT: Кешіріңіз, мен тек қазақ тілінде жауап беремін. Астана туралы айтайын: ол — Қазақстанның астанасы, 1997 жылдан бері. Қала солтүстікте, Есіл өзенінің бойында орналасқан.

logging:
  level:
    kz.kazgpt: INFO
    org.springframework.web.reactive: WARN
